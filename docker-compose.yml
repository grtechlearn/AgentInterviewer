version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8081:8081"
    environment:
      - PYTHONPATH=/app/agentx
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8081
    depends_on:
      - backend
    restart: unless-stopped
